<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ballGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E63946;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1D3557;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D1B2A;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient)" filter="url(#shadow)"/>
  
  <!-- Basketball -->
  <circle cx="256" cy="220" r="120" fill="url(#ballGradient)"/>
  
  <!-- Basketball lines -->
  <g stroke="#1D3557" stroke-width="4" fill="none">
    <!-- Vertical line -->
    <path d="M 256 100 Q 256 160 256 340"/>
    <!-- Horizontal line -->
    <ellipse cx="256" cy="220" rx="120" ry="40"/>
    <!-- Curved lines -->
    <path d="M 160 160 Q 200 220 160 280"/>
    <path d="M 352 160 Q 312 220 352 280"/>
  </g>
  
  <!-- Score display panel -->
  <rect x="80" y="380" width="352" height="80" rx="12" fill="#457B9D" opacity="0.95"/>
  
  <!-- Live indicator -->
  <circle cx="110" cy="420" r="8" fill="#E63946">
    <animate attributeName="opacity" values="1;0.4;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="130" y="426" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">LIVE</text>
  
  <!-- Score numbers -->
  <text x="200" y="435" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#FFFFFF" text-anchor="middle">108</text>
  <text x="256" y="430" font-family="Arial, sans-serif" font-size="24" fill="#A8DADC" text-anchor="middle">-</text>
  <text x="312" y="435" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#FFFFFF" text-anchor="middle">102</text>
  
  <!-- Q4 indicator -->
  <text x="390" y="426" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#F1FAEE">Q4</text>
  <text x="390" y="442" font-family="Arial, sans-serif" font-size="11" fill="#A8DADC">2:30</text>
</svg>